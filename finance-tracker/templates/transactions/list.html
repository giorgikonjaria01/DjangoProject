{% extends "base.html" %}


{% block content %}

<h1>Transactions</h1>


<a href="{% url 'transaction-create' %}">
Add transaction
</a>


{% for transaction in transactions %}

<p>
{{ transaction.description }}
-
{{ transaction.amount }}
</p>

{% empty %}

<p>
No transactions yet
</p>

{% endfor %}


{% endblock %}
